name: Agent and table-context tests

on:
  push:
    paths:
      - "agent/tabref_context_agent/**"
      - "Code/MinerU_PageIndex_TableTree/**"
      - "skill/tabref-table-text-child-selector/**"
      - ".github/workflows/agent-tests.yml"
  pull_request:
    paths:
      - "agent/tabref_context_agent/**"
      - "Code/MinerU_PageIndex_TableTree/**"
      - "skill/tabref-table-text-child-selector/**"
      - ".github/workflows/agent-tests.yml"

jobs:
  test-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent package
        working-directory: agent/tabref_context_agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run agent tests
        working-directory: agent/tabref_context_agent
        run: python -m pytest -q

      - name: Run table-anchor matching tests
        working-directory: Code/MinerU_PageIndex_TableTree
        run: python -m pytest tests/test_table_anchor_matching.py -q
